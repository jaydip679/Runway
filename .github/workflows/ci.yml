name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: runway_test
          POSTGRES_USER: runway
          POSTGRES_PASSWORD: runway
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
          
      - name: Install Dependencies
        working-directory: ./server
        run: npm ci
        
      - name: Generate Prisma Client
        working-directory: ./server
        run: npx prisma generate
        
      - name: Push DB Schema
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://runway:runway@localhost:5432/runway_test
        run: npx prisma db push
        
      - name: Run Linter
        working-directory: ./server
        run: npm run lint
        
      - name: Run Tests
        working-directory: ./server
        env:
          DATABASE_URL: postgresql://runway:runway@localhost:5432/runway_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_secret_123456789012345678901234567890
          REFRESH_TOKEN_HASH_SECRET: test_hash_secret_1234567890123456789012
        run: npm test
